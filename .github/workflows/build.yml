name: build

# Build across every supported target, triggered manually or by a tag push.
# Each target builds on a native runner rather than cross-compiling.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-14
            goos: darwin
            goarch: arm64
          - runner: windows-2022
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: lukka/get-cmake@latest

      - name: install pkg-config
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux) sudo apt-get update && sudo apt-get install -y pkg-config ;;
            macOS) brew list pkg-config >/dev/null 2>&1 || brew install pkg-config ;;
            Windows) choco install --no-progress pkgconfiglite ;;
          esac

      # libghostty-vt is a cgo dependency linked statically via pkg-config. It is
      # not distributed as a package, so build it from source here: CMake fetches
      # the pinned ghostty tree and drives zig. The module cache is read-only, so
      # build in a writable copy and point pkg-config at the generated .pc file
      # for the build and test steps.
      - name: build libghostty-vt
        shell: bash
        run: |
          go mod download go.mitchellh.com/libghostty
          src="$(go list -m -f '{{.Dir}}' go.mitchellh.com/libghostty)"
          work="$RUNNER_TEMP/libghostty"
          cp -R "$src" "$work"
          chmod -R u+w "$work"
          cmake -S "$work" -B "$work/build" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$work/build" --config Release
          printf 'PKG_CONFIG_PATH=%s/build/_deps/ghostty-src/zig-out/share/pkgconfig\n' "$work" >> "$GITHUB_ENV"
          # On Windows pkg-config emits the static library's full .lib path,
          # which cgo rejects as an "invalid flag" unless explicitly allowed.
          printf 'CGO_LDFLAGS_ALLOW=.*[.]lib$\n' >> "$GITHUB_ENV"

      - name: build
        # bash runs on every GitHub runner including Windows, keeping the mkdir
        # and output path portable across shells.
        shell: bash
        env:
          # Native compilation: the runner's own OS/arch matches the target, so
          # cgo stays enabled and no cross toolchain is required. libghostty-vt
          # links statically, yielding a self-contained cli binary.
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/bgx-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}" .

      - name: test
        run: go test ./...

      - uses: actions/upload-artifact@v4
        with:
          name: bgx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

      # Tag pushes carry a pre-release created by the release script; attach
      # each platform's binary so the release script can verify and promote it.
      - name: upload to release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber